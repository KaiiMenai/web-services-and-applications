<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — TaskFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #f5f2eb;
            --surface:  #ffffff;
            --ink:      #1a1a18;
            --muted:    #7a7a72;
            --accent:   #2d6a4f;
            --accent-h: #1b4332;
            --err:      #c0392b;
            --ok:       #2d6a4f;
            --border:   #ddd9d0;
            --radius:   10px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.4;
            pointer-events: none;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem 2.75rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 2px 24px rgba(0,0,0,0.07);
            animation: rise 0.4s ease;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.9rem;
            color: var(--ink);
            letter-spacing: -0.5px;
            margin-bottom: 0.25rem;
        }

        .logo span { color: var(--accent); }

        .subtitle {
            font-size: 0.875rem;
            color: var(--muted);
            margin-bottom: 2rem;
            font-weight: 300;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 0.4rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--ink);
            background: #fafaf8;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 1.2rem;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45,106,79,0.12);
        }

        input.field-error { border-color: var(--err); }

        .hint {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: -0.9rem;
            margin-bottom: 1.1rem;
        }

        .btn {
            width: 100%;
            padding: 0.8rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.25rem;
        }

        .btn:hover  { background: var(--accent-h); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .alert {
            border-radius: 6px;
            padding: 0.65rem 0.9rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }

        .alert-error {
            background: #fdf0ee;
            border: 1px solid #f1c0bb;
            color: var(--err);
        }

        .alert-success {
            background: #eaf4ef;
            border: 1px solid #a8d5b5;
            color: var(--ok);
        }

        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--muted);
        }

        .footer-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Task<span>Flow</span></div>
        <p class="subtitle">Create your account</p>

        <div class="alert alert-error"   id="errorMsg"></div>
        <div class="alert alert-success" id="successMsg"></div>

        <label for="username">Username</label>
        <input type="text" id="username" placeholder="pick a username" autocomplete="username" />

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="at least 6 characters" autocomplete="new-password" />
        <p class="hint">Minimum 6 characters.</p>

        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="repeat password" autocomplete="new-password" />

        <button class="btn" id="registerBtn" onclick="doRegister()">Create account</button>

        <p class="footer-link">Already have an account? <a href="/login">Sign in</a></p>
    </div>

    <script>
        const fields      = ['username', 'email', 'password', 'confirm'];
        const errorMsg    = document.getElementById('errorMsg');
        const successMsg  = document.getElementById('successMsg');
        const registerBtn = document.getElementById('registerBtn');

        fields.forEach(id => {
            document.getElementById(id).addEventListener('keydown', e => {
                if (e.key === 'Enter') doRegister();
            });
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        async function doRegister() {
            const username = document.getElementById('username').value.trim();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirm').value;

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!username || !email || !password || !confirm) {
                showError('Please fill in all fields.'); return;
            }
            if (password.length < 6) {
                showError('Password must be at least 6 characters.'); return;
            }
            if (password !== confirm) {
                showError('Passwords do not match.'); return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating account…';

            try {
                const res  = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    showSuccess('Account created! Redirecting to login…');
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    showError(data.error || 'Registration failed.');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create account';
            }
        }
    </script>
</body>
</html>
