<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks — TaskFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg:       #f5f2eb;
            --surface:  #ffffff;
            --ink:      #1a1a18;
            --muted:    #7a7a72;
            --accent:   #2d6a4f;
            --accent-h: #1b4332;
            --err:      #c0392b;
            --border:   #ddd9d0;
            --radius:   10px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.4;
            pointer-events: none;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem 2.25rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 2px 24px rgba(0,0,0,0.07);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.8rem;
            color: var(--ink);
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent);
        }

        .btn {
            padding: 0.7rem 1rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover  { background: var(--accent-h); }
        .btn:active { transform: scale(0.98); }

        .btn-logout {
            background: var(--err);
        }

        .btn-logout:hover { background: #a0251e; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
        }

        thead th {
            background: #f0f0ef;
            font-weight: 500;
            color: var(--ink);
            padding: 0.6rem 0.8rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 0.6rem 0.8rem;
            border-bottom: 1px solid #f0f0ef;
        }

        tbody tr:nth-child(even) {
            background: #fdfdfd;
        }

        .btn-table {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
        }

        .btn-table:hover {
            background: #f0f0ef;
            border-color: var(--accent);
        }

        .form-group {
            margin-bottom: 0.9rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--ink);
            letter-spacing: 0.03em;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
        }

        input, select {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--ink);
            background: #fafaf8;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45,106,79,0.12);
        }
    </style>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
</head>
<body>
    <div class="card">

        <div class="header">
            <div class="logo">Task<span>Flow</span> <span style="font-size: 1rem; font-weight: 400; color: var(--muted);">— Tasks</span></div>

            <button id="logoutBtn" class="btn btn-logout">Logout</button>
        </div>

        <button id="showCreateButton" class="btn" onclick="showCreate()">Create Task</button>

        <table id="taskTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Task Name</th>
                    <th>Description</th>
                    <th>Due Date</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div id="createUpdateForm" style="display: none; margin-top: 1.2rem; padding: 1.2rem; background: #fdfdfd; border-radius: 8px;">
            <h2>
                <span id="createLabel">Create a</span>
                <span id="updateLabel" style="display: none;">Update</span>
                Task
            </h2>

            <input type="hidden" name="id" />

            <div class="form-group">
                <label for="create-name">Task name</label>
                <input type="text" id="create-name" name="task_name" />
            </div>

            <div class="form-group">
                <label for="create-description">Description</label>
                <input type="text" id="create-description" name="description" />
            </div>

            <div class="form-group">
                <label for="create-due-date">Due date</label>
                <input type="date" id="create-due-date" name="due_date" />
            </div>

            <div class="form-group">
                <label for="create-status">Status</label>
                <select id="create-status" name="status">
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="form-group">
                <label for="create-category">Category</label>
                <select id="create-category" name="category_id"></select>
            </div>

            <div>
                <button id="doCreateButton" class="btn" onclick="doCreate()">Create</button>
                <button id="doUpdateButton" class="btn" style="display: none;" onclick="doUpdate()">Update</button>
            </div>
        </div>

    </div>

    <script>
        const btn = document.getElementById('logoutBtn');
        btn.addEventListener('click', async () => {
            try {
                const res = await fetch('/api/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/login';
                } else {
                    console.log('logout failed:', data.message);
                }
            } catch (err) {
                console.log('network error on logout:', err);
            }
        });


        function showCreate() {
            document.getElementById('showCreateButton').style.display = 'none';
            document.getElementById('taskTable').style.display = 'none';
            document.getElementById('createUpdateForm').style.display = 'block';

            document.getElementById('createLabel').style.display = 'inline';
            document.getElementById('updateLabel').style.display = 'none';

            document.getElementById('doCreateButton').style.display = 'block';
            document.getElementById('doUpdateButton').style.display = 'none';

            clearForm();
        }

        function showViewAll() {
            document.getElementById('showCreateButton').style.display = 'block';
            document.getElementById('taskTable').style.display = 'table';
            document.getElementById('createUpdateForm').style.display = 'none';
        }

        function showUpdate(buttonElement) {
            document.getElementById('showCreateButton').style.display = 'none';
            document.getElementById('taskTable').style.display = 'none';
            document.getElementById('createUpdateForm').style.display = 'block';

            document.getElementById('createLabel').style.display = 'none';
            document.getElementById('updateLabel').style.display = 'inline';

            document.getElementById('doCreateButton').style.display = 'none';
            document.getElementById('doUpdateButton').style.display = 'block';

            const rowElement = buttonElement.closest('tr');
            const task = getTaskFromRow(rowElement);
            populateFormWithTask(task);
        }

        function doCreate(){
            const form = document.getElementById('createUpdateForm');
            const task = {
                task_name:   form.querySelector('[name="task_name"]').value,
                description: form.querySelector('[name="description"]').value,
                due_date:    form.querySelector('[name="due_date"]').value,
                status:      form.querySelector('[name="status"]').value,
                category_id: form.querySelector('[name="category_id"]').value || null
            };

            console.log("Attempting to create task:", JSON.stringify(task, null, 2)); 

            createTaskAjax(task);
        }

        function doUpdate() {
            const task = getTaskFromForm();
            updateTaskAjax(task);
            setTaskInRow(document.getElementById(task.id), task);
            clearForm();
            showViewAll();
        }

        function doDelete(buttonElement) {
            const rowElement = buttonElement.closest('tr');
            const id = rowElement.getAttribute('data-id');
            deleteTaskAjax(id);
            rowElement.remove();
        }

        // --- table helpers ---
        function addTaskToTable(task) {
            const tbody = document.querySelector('#taskTable tbody');
            const row = document.createElement('tr');
            row.setAttribute('data-id', task.id);

            row.innerHTML = `
                <td>${task.id}</td>
                <td>${task.task_name}</td>
                <td>${task.description || ''}</td>
                <td>${task.due_date || ''}</td>
                <td>${task.category_name || 'uncategorised'}</td>
                <td>${task.status}</td>
                <td>
                    <button class="btn btn-table" onclick="showUpdate(this)">Edit</button>
                    <button class="btn btn-table" onclick="doDelete(this)">Delete</button>
                </td>
            `;

            tbody.appendChild(row);
        }

        function clearForm() {
            const form = document.getElementById('createUpdateForm');
            form.querySelector('[name="id"]').value = '';
            form.querySelector('[name="task_name"]').value = '';
            form.querySelector('[name="description"]').value = '';
            form.querySelector('[name="due_date"]').value = '';
            form.querySelector('[name="status"]').value = 'pending';
            form.querySelector('[name="category_id"]').value = '';
        }

        function getTaskFromRow(rowElement) {
            const cells = rowElement.querySelectorAll('td');
            return {
                id:          rowElement.getAttribute('data-id'),
                task_name:   cells[1].textContent,
                description: cells[2].textContent,
                due_date:    cells[3].textContent,
                category_id: cells[4].getAttribute('data-cat-id') || null,
                status:      cells[5].textContent
            };
        }

        function setTaskInRow(rowElement, task) {
            const cells = rowElement.querySelectorAll('td');
            cells[1].textContent = task.task_name;
            cells[2].textContent = task.description;
            cells[3].textContent = task.due_date;
            cells[4].textContent = task.category_name || 'uncategorised';
            cells[4].setAttribute('data-cat-id', task.category_id || '');
            cells[5].textContent = task.status;
        }

        function populateFormWithTask(task) {
            const form = document.getElementById('createUpdateForm');
            form.querySelector('[name="id"]').value = task.id;
            form.querySelector('[name="task_name"]').value = task.task_name;
            form.querySelector('[name="description"]').value = task.description;
            form.querySelector('[name="due_date"]').value = task.due_date;
            form.querySelector('[name="status"]').value = task.status;
            form.querySelector('[name="category_id"]').value = task.category_id || '';
        }

        function getTaskFromForm() {
            const form = document.getElementById('createUpdateForm');
            return {
                id:          form.querySelector('[name="id"]').value,
                task_name:   form.querySelector('[name="task_name"]').value,
                description: form.querySelector('[name="description"]').value,
                due_date:    form.querySelector('[name="due_date"]').value,
                status:      form.querySelector('[name="status"]').value,
                category_id: form.querySelector('[name="category_id"]').value || null
            };
        }

        // --- API calls ---
        function getAllAjax() {
            $.ajax({
                url: "/tasks",
                method: "GET",
                dataType: "JSON",
                success: function(result) {
                    for (const task of result) {
                        addTaskToTable(task);
                    }
                },
                error: function(xhr, status, error) {
                    console.log("error:", status, "msg:", error);
                }
            });
        }

        function createTaskAjax(task) {
            $.ajax({
                url: "/tasks",
                method: "POST",
                data: JSON.stringify(task),
                dataType: "JSON",
                contentType: "application/json; charset=utf-8",
                success: function(result) {
                    task.id = result.id;
                    addTaskToTable(task);
                    clearForm();
                    showViewAll();
                },
                error: function(xhr, status, error) {
                    console.log("error:", status, "msg:", error);
                }
            });
        }

        function updateTaskAjax(task) {
            $.ajax({
                url: `/tasks/${encodeURIComponent(task.id)}`,
                method: "PUT",
                data: JSON.stringify(task),
                dataType: "JSON",
                contentType: "application/json; charset=utf-8",
                success: function(result) {
                    console.log("updated:", result);
                },
                error: function(xhr, status, error) {
                    console.log("error:", status, "msg:", error);
                }
            });
        }

        function deleteTaskAjax(id) {
            $.ajax({
                url: `/tasks/${encodeURIComponent(id)}`,
                method: "DELETE",
                dataType: "JSON",
                success: function(result) {
                    console.log("deleted id:", id);
                },
                error: function(xhr, status, error) {
                    console.log("error:", status, "msg:", error);
                }
            });
        }

        getAllAjax();
    </script>
</body>
</html>
